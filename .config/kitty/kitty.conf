shell /usr/bin/zsh
kitty_mod super

# --- Fonts ---
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 13

# --- Window Layout ---
window_padding_width 4
hide_window_decorations yes
remember_window_size  no
background_opacity 0.85

# --- Performance & Behavior ---
enable_audio_bell no
visual_bell_duration 0.0
scrollback_lines 10000
cursor_blink_interval 0

# Disable ligatures only when the cursor is over them to make code editing precise
disable_ligatures cursor 

# --- Maximum Latency Reduction ---
# Strips away artificial batching delays to prioritize raw input speed
input_delay 0
repaint_delay 2
sync_to_monitor no

# --- Hardware Clipboard Interception ---
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# this is to create a new terminal window like tmux
map alt+t new_tab_with_cwd
tab_title_template "{index}: {title.split('/')[-1]}"
tab_bar_style powerline
tab_powerline_style slanted
