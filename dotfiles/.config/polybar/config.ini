# ============================================================
#  polybar config — Rose Pine (main)
#  ~/.config/polybar/config.ini
# ============================================================

# ── Rose Pine palette ───────────────────────────────────────
[colors]
base      = #191724
surface   = #1f1d2e
overlay   = #26233a
muted     = #6e6a86
subtle    = #908caa
text      = #e0def4
love      = #eb6f92
gold      = #f6c177
rose      = #ebbcba
pine      = #31748f
foam      = #9ccfd8
iris      = #c4a7e7
hl-low    = #21202e
hl-med    = #403d52
hl-high   = #524f67
transparent = #00000000

# ── Bar ─────────────────────────────────────────────────────
[bar/main]
monitor               =
width                 = 100%
height                = 35
offset-x              = 0
offset-y              = 0
radius                = 0

; Rose Pine surface with slight alpha for depth
background            = ${colors.surface}
foreground            = ${colors.text}

line-size             = 2
line-color            = ${colors.pine}

border-size           = 0
padding-left          = 2
padding-right         = 2
module-margin-left    = 1
module-margin-right   = 1

; Nerd Font — same as kitty & nvim
font-0 = "JetBrainsMono Nerd Font:pixelsize=12:antialias=true;3"
font-1 = "JetBrainsMono Nerd Font:pixelsize=14:antialias=true;4"
font-2 = "Noto Color Emoji:pixelsize=12;3"

modules-left   = i3 sep xwindow
modules-center = date
modules-right  = sep volume battery sep network sep powermenu

tray-position       = right
tray-padding        = 4
tray-background     = ${colors.surface}
tray-maxsize        = 18

cursor-click  = pointer
cursor-scroll = ns-resize

enable-ipc    = true
wm-restack    = i3

; override-redirect hides the bar from i3's view (polybar floats above)
override-redirect = false

; Fake transparency
pseudo-transparency = false

# ── Modules ─────────────────────────────────────────────────

[module/i3]
type            = internal/i3
format          = <label-state> <label-mode>
index-sort      = true
wrapping-scroll = false
strip-wsnumbers = true

label-focused            = %name%
label-focused-foreground = ${colors.text}
label-focused-background = ${colors.overlay}
label-focused-underline  = ${colors.pine}
label-focused-padding    = 2

label-unfocused            = %name%
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding    = 2

label-visible            = %name%
label-visible-foreground = ${colors.subtle}
label-visible-padding    = 2

label-urgent            = %name%
label-urgent-foreground = ${colors.love}
label-urgent-background = ${colors.base}
label-urgent-padding    = 2

label-mode            = %mode%
label-mode-foreground = ${colors.gold}
label-mode-padding    = 2

[module/sep]
type    = custom/text
content = " │ "
content-foreground = ${colors.hl-high}

[module/xwindow]
type              = internal/xwindow
label             = %title:0:50:...%
label-foreground  = ${colors.subtle}
label-maxlen      = 50

[module/date]
type          = internal/date
interval      = 1
date          = "%a %d %b"
time          = "%H:%M"
label         = " %date%   %time%"
label-foreground = ${colors.rose}

; [module/cpu]
; type                  = internal/cpu
; interval              = 2
; format-prefix         = "󰻠 "
; format-prefix-foreground = ${colors.foam}
; label                 = %percentage:2%%
; label-foreground      = ${colors.text}
; format-underline      = ${colors.foam}
;
; [module/memory]
; type                  = internal/memory
; interval              = 3
; format-prefix         = "󰍛 "
; format-prefix-foreground = ${colors.iris}
; label                 = %percentage_used%%
; label-foreground      = ${colors.text}
; format-underline      = ${colors.iris}

[module/volume]
type              = internal/pulseaudio
format-volume     = <ramp-volume> <label-volume>
label-volume      = %percentage%%
label-volume-foreground = ${colors.text}

label-muted         = 󰖁 muted
label-muted-foreground = ${colors.muted}

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.gold}

format-volume-underline = ${colors.gold}
format-muted-underline  = ${colors.muted}

click-right = pavucontrol

[module/battery]
type                      = internal/battery
battery                   = BAT1
adapter                   = ACAD
full-at                   = 98
poll-interval             = 5

format-charging           = <animation-charging>  <label-charging>
format-discharging        = <ramp-capacity>  <label-discharging>
format-full               =  <label-full>

label-charging            = %percentage%%
label-discharging         = %percentage%%
label-full                = Full

label-charging-foreground   = ${colors.foam}
label-discharging-foreground = ${colors.text}
label-full-foreground       = ${colors.pine}

format-charging-underline   = ${colors.foam}
format-discharging-underline = ${colors.gold}
format-full-underline       = ${colors.pine}

ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁻
ramp-capacity-2 = 󰁼
ramp-capacity-3 = 󰁽
ramp-capacity-4 = 󰁾
ramp-capacity-5 = 󰁿
ramp-capacity-6 = 󰂀
ramp-capacity-7 = 󰂁
ramp-capacity-8 = 󰂂
ramp-capacity-9 = 󰁹
ramp-capacity-foreground = ${colors.gold}

animation-charging-0 = 󰢜
animation-charging-1 = 󰂆
animation-charging-2 = 󰂇
animation-charging-3 = 󰂈
animation-charging-4 = 󰢝
animation-charging-5 = 󰂉
animation-charging-6 = 󰢞
animation-charging-foreground = ${colors.foam}
animation-charging-framerate = 750

[module/network]
type            = internal/network
interface-type  = wireless
interval        = 3

format-connected    = <ramp-signal>  <label-connected>
label-connected     = %essid%
label-connected-foreground = ${colors.text}

format-disconnected    = 󰖪  <label-disconnected>
label-disconnected     = disconnected
label-disconnected-foreground = ${colors.muted}

ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨
ramp-signal-foreground = ${colors.pine}

format-connected-underline    = ${colors.pine}
format-disconnected-underline = ${colors.muted}

[module/powermenu]
type = custom/menu

expand-right = false
format-spacing = 1

label-open  = 󰐥
label-open-foreground = ${colors.love}
label-close =  cancel
label-close-foreground = ${colors.muted}
label-separator = |
label-separator-foreground = ${colors.hl-high}

menu-0-0 = reboot
menu-0-0-foreground = ${colors.gold}
menu-0-0-exec = menu-open-1

menu-0-1 = poweroff
menu-0-1-foreground = ${colors.love}
menu-0-1-exec = menu-open-2

menu-0-2 = logout
menu-0-2-foreground = ${colors.rose}
menu-0-2-exec = menu-open-3

menu-1-0 = cancel
menu-1-0-foreground = ${colors.muted}
menu-1-0-exec = menu-open-0

menu-1-1 = reboot
menu-1-1-foreground = ${colors.gold}
menu-1-1-exec = systemctl reboot

menu-2-0 = poweroff
menu-2-0-foreground = ${colors.love}
menu-2-0-exec = systemctl poweroff

menu-2-1 = cancel
menu-2-1-foreground = ${colors.muted}
menu-2-1-exec = menu-open-0

menu-3-0 = logout
menu-3-0-foreground = ${colors.rose}
menu-3-0-exec = i3-msg exit

menu-3-1 = cancel
menu-3-1-foreground = ${colors.muted}
menu-3-1-exec = menu-open-0
