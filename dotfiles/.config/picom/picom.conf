# ============================================================
#  picom.conf — Rose Pine aesthetic compositor
#  Blur + rounded corners + subtle shadows
# ============================================================

# ── Backend ─────────────────────────────────────────────────
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = true;

# ── Shadows ─────────────────────────────────────────────────
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.55;
shadow-offset-x = -12;
shadow-offset-y = -8;
shadow-color = "#110f1a";

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c",
  "class_g = 'i3-frame'",
  "class_g = 'polybar'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# ── Fading ──────────────────────────────────────────────────
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 4;

fade-exclude = [];

# ── Opacity ─────────────────────────────────────────────────
inactive-opacity = 0.90;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g = 'i3lock'",
  "100:class_g = 'feh'",
  "100:class_g = 'nitrogen'",
  "85:class_g = 'kitty' && focused",
  "78:class_g = 'kitty' && !focused",
  "95:class_g = 'Rofi'",
  "100:window_type = 'dock'"
];

# ── Blur ────────────────────────────────────────────────────
blur-method = "dual_kawase";
blur-strength = 6;
blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'i3lock'",
  "_GTK_FRAME_EXTENTS@:c"
];

# ── Rounded corners ─────────────────────────────────────────
corner-radius = 10;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'i3lock'"
];

# ── General ─────────────────────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-ewmh-active-win = true;
log-level = "warn";
